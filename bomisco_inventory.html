<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomisco Inventory — Top 5 Adaptive Insights Accounts</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #333;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 4px;
      color: #1a1a2e;
    }
    p.subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 32px;
    }
    .chart-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 720px;
    }
    table {
      width: 100%;
      max-width: 720px;
      border-collapse: collapse;
      margin-top: 24px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    th {
      background: #1a1a2e;
      color: white;
      padding: 12px 16px;
      text-align: left;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    td {
      padding: 12px 16px;
      font-size: 0.95rem;
      border-bottom: 1px solid #f0f0f0;
    }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: #fafafa; }
    td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <h1>Bomisco Inventory — Top 5 Adaptive Insights Accounts</h1>
  <p class="subtitle">On-hand quantity by account (monthly sum)</p>

  <div class="chart-container">
    <canvas id="inventoryChart"></canvas>
  </div>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Account</th>
        <th>On Hand Quantity</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>1</td><td>Guitar Center</td><td>640,426</td></tr>
      <tr><td>2</td><td>Sweetwater</td><td>216,497</td></tr>
      <tr><td>3</td><td>Amazon</td><td>196,623</td></tr>
      <tr><td>4</td><td>DMT</td><td>124,479</td></tr>
      <tr><td>5</td><td>Hook Up</td><td>108,510</td></tr>
    </tbody>
  </table>

  <script>
    const ctx = document.getElementById('inventoryChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Guitar Center', 'Sweetwater', 'Amazon', 'DMT', 'Hook Up'],
        datasets: [{
          label: 'On Hand Quantity',
          data: [640426, 216497, 196623, 124479, 108510],
          backgroundColor: [
            '#2563eb',
            '#3b82f6',
            '#60a5fa',
            '#93c5fd',
            '#bfdbfe',
          ],
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ' ' + ctx.parsed.y.toLocaleString() + ' units'
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { size: 13 } }
          },
          y: {
            beginAtZero: true,
            grid: { color: '#f0f0f0' },
            ticks: {
              callback: val => val.toLocaleString(),
              font: { size: 12 }
            }
          }
        }
      }
    });
  </script>
</body>
</html>
